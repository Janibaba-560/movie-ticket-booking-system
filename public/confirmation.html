<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Booking Confirmation</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header class="site-header">
    <h1>✅ Booking Confirmation</h1>
  </header>

  <main class="container">
    <section class="movie-info">
      <img id="poster" src="" alt="Movie Poster"/>
      <div class="details">
        <h2 id="movie-name"></h2>
        <p id="movie-time"></p>
        <p>Seats: <span id="selected-seats"></span></p>
        <p>Total Paid: ₹<span id="total-price"></span></p>
        <p>Transaction ID: <span id="txn-id"></span></p>
      </div>
    </section>

    <section class="confirmation-msg">
      <h3>Thank you for your booking!</h3>
      <p>Enjoy the movie 🎬</p>
      <a href="index.html" class="btn">Back to Home</a>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2025 Movie Booking Project</p>
  </footer>

  <script src="confirmation.js"></script>
<script src="script.js"></script>

</body>
</html>
