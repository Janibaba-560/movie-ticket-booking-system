<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Booking Page</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<header class="site-header">
<h1>🎫 Select Your Seats & Snacks</h1>
</header>

<main class="container">
<!-- Movie Info -->
<section class="movie-info">
<img id="poster" src="" alt="Movie Poster" />
<div class="details">
<h2 id="movie-name"></h2>
<p id="movie-time"></p>
</div>
</section>

<section class="seating">
<h3>Pick Your Seats:</h3>

<!-- 3D Theater wrapper -->
<div class="theater">
<div class="seats-screen">🎬 SCREEN 🎬</div>
<div class="seats-grid"></div>
</div>

<p>Selected Seats: <span id="selected-seats">None</span></p>
<p>Total Seats Price: ₹<span id="seat-total">0</span></p>
</section>

<!-- Snacks Section -->
<section class="snacks">
<h3>Select Snacks:</h3>
<label>Popcorn (₹100): </label>
<input type="number" id="popcorn" value="0" min="0"/>
<label>Soda (₹50): </label>
<input type="number" id="soda" value="0" min="0"/>
<label>Combo (₹150): </label>
<input type="number" id="combo" value="0" min="0"/>
<p>Total Snacks Price: ₹<span id="snack-total">0</span></p>
</section>

<p><strong>Total Amount: ₹<span id="grand-total">0</span></strong></p>
<a id="proceed-btn" class="btn" href="#">Proceed to Payment</a>
</main>

<footer class="site-footer">
<p>© 2025 Movie Booking Project</p>
</footer>
<script src="booking.js"></script>
<script src="script.js"></script>
</body>
</html>
